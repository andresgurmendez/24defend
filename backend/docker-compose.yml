services:
  api:
    build: .
    ports:
      - "9147:8080"
    environment:
      - DEFEND_DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DEFEND_AWS_REGION=us-east-1
      - DEFEND_BEDROCK_REGION=us-east-1
      - DEFEND_BEDROCK_MODEL_ID=us.anthropic.claude-sonnet-4-6
      - DEFEND_API_KEY=dev-api-key-change-me
      - DEFEND_ENV=dev
      # For local DynamoDB (no real AWS needed)
      - AWS_DEFAULT_REGION=us-east-1
      # Bedrock credentials — passed from host env or aws.sh
      # In production, IAM roles provide these automatically
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      # Serper (Google search) — optional
      - DEFEND_SERPER_API_KEY=${DEFEND_SERPER_API_KEY:-}
    depends_on:
      - dynamodb-local

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
